spring.main.web-application-type=servlet
server.port=${PORT:8080}

# use env vars in prod; hardcoding only for local testing
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


app.mail.from=booking@royalchappy.com
app.mail.admin=doug@royalchappy.com
app.base-url=https://royalchappy.com

